<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Home</title>
    <link rel="stylesheet" href="/output.css">
    <link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
  rel="stylesheet">
</head>
<body>
    <header>
        <h2 class="text-red-700 text-4xl">Register your home here:</h2>
    </header>
    <main style="margin: 10px">
        <form action="/host/home" method="POST">
        <input type="text" name="address" placeholder="Enter your address" class="form-control"/>
        <input type="submit" class="btn btn-success"/>
        </form>
        <a href="/" class="link-primary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">Go to home</a>
    </main>
    
        
</body>
</html>
